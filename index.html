<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>SMM Panel - مشاهدات تيك توك/يوتيوب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width">
</head>
<body class="bg-gradient-to-br from-purple-600 to-blue-600 min-h-screen">
    <div class="container mx-auto px-4 py-12">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-bold text-white mb-4">🚀 SMM Panel</h1>
            <p class="text-xl text-blue-100">مشاهدات تيك توك | يوتيوب | إعجابات</p>
        </div>
        
        <div class="grid md:grid-cols-3 gap-8 max-w-4xl mx-auto">
            <!-- تيك توك -->
            <div class="bg-white/20 backdrop-blur-lg rounded-3xl p-8 border border-white/30">
                <h3 class="text-2xl font-bold text-white mb-4">🎥 تيك توك</h3>
                <div class="space-y-3">
                    <div class="flex justify-between text-lg">
                        <span>1000 مشاهدة</span>
                        <span class="font-bold text-green-400">$4.99</span>
                    </div>
                    <input class="w-full p-3 rounded-xl bg-white/20 text-white placeholder-white/70" 
                           placeholder="رابط تيك توك">
                    <button class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-xl font-bold hover:from-green-600 hover:to-green-700">
                        اشترِ الآن
                    </button>
                </div>
            </div>
            
            <!-- يوتيوب -->
            <div class="bg-white/20 backdrop-blur-lg rounded-3xl p-8 border border-white/30">
                <h3 class="text-2xl font-bold text-white mb-4">📺 يوتيوب</h3>
                <div class="space-y-3">
                    <div class="flex justify-between text-lg">
                        <span>1000 مشاهدة</span>
                        <span class="font-bold text-green-400">$6.99</span>
                    </div>
                    <input class="w-full p-3 rounded-xl bg-white/20 text-white placeholder-white/70" 
                           placeholder="رابط يوتيوب">
                    <button class="w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white py-3 rounded-xl font-bold hover:from-blue-600 hover:to-blue-700">
                        اشترِ الآن
                    </button>
                </div>
            </div>
            
            <!-- إحصائيات -->
            <div class="bg-white/20 backdrop-blur-lg rounded-3xl p-8 border border-white/30">
                <h3 class="text-2xl font-bold text-white mb-6">📊 إحصائيات</h3>
                <div class="space-y-4 text-lg">
                    <div class="flex justify-between">
                        <span>الطلبات اليوم</span>
                        <span class="font-bold text-yellow-400">247</span>
                    </div>
                    <div class="flex justify-between">
                        <span>الإجمالي</span>
                        <span class="font-bold text-green-400">$12,450</span>
                    </div>
                    <div class="flex justify-between">
                        <span>سرعة التسليم</span>
                        <span class="font-bold text-cyan-400">1-30 دقيقة</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-16">
            <p class="text-blue-100 text-lg">SMM Panel © 2024 - جميع الحقوق محفوظة</p>
        </div>
    </div>
</body>
</html>
